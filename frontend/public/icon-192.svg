<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>

  <!-- App logo: "m" + dot -->
  <text x="20" y="52" font-family="Arial,sans-serif" font-weight="900" font-size="38" fill="white" opacity="0.95">m</text>
  <circle cx="66" cy="42" r="5" fill="#3b82f6"/>

  <!-- Notification bar 1: Blue -->
  <rect x="16" y="66" width="160" height="34" rx="9" fill="#1e3a8a" opacity="0.9"/>
  <rect x="16" y="66" width="6" height="34" rx="9" fill="#60a5fa"/>
  <rect x="16" y="66" width="6" height="17" fill="#60a5fa"/>
  <rect x="30" y="76" width="68" height="7" rx="3.5" fill="white" opacity="0.95"/>
  <rect x="30" y="87" width="108" height="5" rx="2.5" fill="white" opacity="0.45"/>

  <!-- Notification bar 2: Rose -->
  <rect x="16" y="108" width="160" height="34" rx="9" fill="#881337" opacity="0.9"/>
  <rect x="16" y="108" width="6" height="34" rx="9" fill="#fb7185"/>
  <rect x="16" y="108" width="6" height="17" fill="#fb7185"/>
  <rect x="30" y="118" width="84" height="7" rx="3.5" fill="white" opacity="0.95"/>
  <rect x="30" y="129" width="96" height="5" rx="2.5" fill="white" opacity="0.45"/>

  <!-- Notification bar 3: Emerald -->
  <rect x="16" y="150" width="160" height="34" rx="9" fill="#064e3b" opacity="0.9"/>
  <rect x="16" y="150" width="6" height="34" rx="9" fill="#34d399"/>
  <rect x="16" y="150" width="6" height="17" fill="#34d399"/>
  <rect x="30" y="160" width="56" height="7" rx="3.5" fill="white" opacity="0.95"/>
  <rect x="30" y="171" width="118" height="5" rx="2.5" fill="white" opacity="0.45"/>
</svg>
