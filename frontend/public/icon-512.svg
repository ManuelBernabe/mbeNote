<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- App logo: "m" + dot -->
  <text x="52" y="140" font-family="Arial,sans-serif" font-weight="900" font-size="102" fill="white" opacity="0.95">m</text>
  <circle cx="178" cy="112" r="14" fill="#3b82f6"/>

  <!-- Notification bar 1: Blue -->
  <rect x="42" y="176" width="428" height="90" rx="24" fill="#1e3a8a" opacity="0.9"/>
  <rect x="42" y="176" width="16" height="90" rx="24" fill="#60a5fa"/>
  <rect x="42" y="176" width="16" height="45" fill="#60a5fa"/>
  <rect x="78" y="202" width="182" height="18" rx="9" fill="white" opacity="0.95"/>
  <rect x="78" y="228" width="290" height="14" rx="7" fill="white" opacity="0.45"/>

  <!-- Notification bar 2: Rose -->
  <rect x="42" y="288" width="428" height="90" rx="24" fill="#881337" opacity="0.9"/>
  <rect x="42" y="288" width="16" height="90" rx="24" fill="#fb7185"/>
  <rect x="42" y="288" width="16" height="45" fill="#fb7185"/>
  <rect x="78" y="314" width="224" height="18" rx="9" fill="white" opacity="0.95"/>
  <rect x="78" y="340" width="256" height="14" rx="7" fill="white" opacity="0.45"/>

  <!-- Notification bar 3: Emerald -->
  <rect x="42" y="400" width="428" height="90" rx="24" fill="#064e3b" opacity="0.9"/>
  <rect x="42" y="400" width="16" height="90" rx="24" fill="#34d399"/>
  <rect x="42" y="400" width="16" height="45" fill="#34d399"/>
  <rect x="78" y="426" width="150" height="18" rx="9" fill="white" opacity="0.95"/>
  <rect x="78" y="452" width="316" height="14" rx="7" fill="white" opacity="0.45"/>
</svg>
