<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>

  <!-- Notification bar 1: Blue -->
  <rect x="4" y="7" width="40" height="10" rx="3" fill="#1e40af" opacity="0.9"/>
  <rect x="4" y="7" width="3" height="10" rx="3" fill="#60a5fa"/>
  <rect x="4" y="7" width="3" height="5" fill="#60a5fa"/>
  <rect x="10" y="10" width="18" height="4" rx="2" fill="white" opacity="0.9"/>

  <!-- Notification bar 2: Rose -->
  <rect x="4" y="20" width="40" height="10" rx="3" fill="#881337" opacity="0.9"/>
  <rect x="4" y="20" width="3" height="10" rx="3" fill="#fb7185"/>
  <rect x="4" y="20" width="3" height="5" fill="#fb7185"/>
  <rect x="10" y="23" width="22" height="4" rx="2" fill="white" opacity="0.9"/>

  <!-- Notification bar 3: Emerald -->
  <rect x="4" y="33" width="40" height="10" rx="3" fill="#064e3b" opacity="0.9"/>
  <rect x="4" y="33" width="3" height="10" rx="3" fill="#34d399"/>
  <rect x="4" y="33" width="3" height="5" fill="#34d399"/>
  <rect x="10" y="36" width="14" height="4" rx="2" fill="white" opacity="0.9"/>
</svg>
